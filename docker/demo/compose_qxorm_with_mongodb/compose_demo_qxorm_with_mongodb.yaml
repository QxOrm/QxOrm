# ----------------------------------------------------------------------------------
# QxOrm Demo Stack (C++ / Qt / ODM / HTTP Web Server / REST API / MongoDB)
# 
# This demo environment runs a complete C++ backend stack using:
#   - QxOrm (C++ ODM based on Qt)
#   - REST API server (C++ backend)
#   - MongoDB database
#   - Nginx reverse proxy
#   - Optional frontend UI
# 
# Goal:
#   Run a complete C++ backend stack in one command
# 
# Requirements:
#   - Docker
#   - Docker Compose
# 
# Quick start:
#   curl -L -O https://raw.githubusercontent.com/QxOrm/QxOrm/master/docker/demo/compose_qxorm_with_mongodb/compose_demo_qxorm_with_mongodb.yaml
#   docker compose -f compose_demo_qxorm_with_mongodb.yaml up -d
# 
# URL web access:
#   http://localhost:8080
# 
# API test:
#   - ping:             curl -X POST http://localhost:8080/ping -H "Content-Type: application/json" -d "{ \"request_id\":\"random_request_id\", \"action\":\"ping\" }"
#   - list entities:    curl -X POST http://localhost:8080/qx -H "Content-Type: application/json" -d "{ \"request_id\":\"random_request_id\", \"action\":\"get_meta_data\", \"entity\":\"*\" }"
#   - database access:  curl -X POST http://localhost:8080/qx -H "Content-Type: application/json" -d "{ \"request_id\":\"random_request_id\", \"action\":\"fetch_all\", \"entity\":\"blog\" }"
# 
# Images are pulled automatically from Docker Hub:
#   https://hub.docker.com/u/qxorm
# 
# This is a demo setup:
#   - No build required
#   - No local dependencies
#   - Designed for quick evaluation
# 
# Advanced (full development environment with Docker):
#   A complete C++ development setup is also available, including:
#      - Debug-ready backend environment
#      - VS Code Remote / Dev Containers support
# 
# See documentation for details:
#   https://github.com/QxOrm/QxOrm/tree/master/docker/dev/compose_qxorm_with_mongodb
# ----------------------------------------------------------------------------------

services:
  nginx_reverse_proxy:
    image: qxorm/compose_qxorm_with_mongodb-nginx_reverse_proxy:latest
    container_name: qxorm_demo_mongodb_nginx
    ports:
      - 8080:8080
      - 8081:8081
    depends_on:
      - frontend_html_js_css
      - backend_qxorm
    networks:
      - compose_qxorm_with_mongodb_frontnet
    healthcheck:
      test: curl --fail --request POST http://backend_qxorm:9642/ping || exit 1
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  frontend_html_js_css:
    image: qxorm/compose_qxorm_with_mongodb-frontend_html_js_css:latest
    container_name: qxorm_demo_mongodb_frontend
    hostname: frontend_html_js_css
    restart: unless-stopped
    networks:
      - compose_qxorm_with_mongodb_frontnet
    expose:
      - 80

  backend_qxorm:
    image: qxorm/compose_qxorm_with_mongodb-backend_qxorm:latest
    container_name: qxorm_demo_mongodb_backend
    hostname: backend_qxorm
    restart: unless-stopped
    environment:
      - QX_DB=mongodb
    depends_on:
      - db_mongodb
    networks:
      - compose_qxorm_with_mongodb_frontnet
      - compose_qxorm_with_mongodb_backnet
    volumes:
      - qxorm_backend_src:/home/qxorm/src
    expose:
      - 9642
      - 9643
    ports:
      - 2222:22

  db_mongodb:
    image: qxorm/compose_qxorm_with_mongodb-db_mongodb:latest
    container_name: qxorm_demo_mongodb_db
    hostname: db_mongodb
    restart: unless-stopped
    networks:
      - compose_qxorm_with_mongodb_backnet
    volumes:
      - mongodb_db_data:/data/db
    expose:
      - 27017

volumes:
  mongodb_db_data:
  qxorm_backend_src:

networks:
  compose_qxorm_with_mongodb_backnet:
  compose_qxorm_with_mongodb_frontnet:
